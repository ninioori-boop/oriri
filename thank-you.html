<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>תודה רבה! - הכלכלן של הבית</title>
  <style>
    :root {
      --gold: #B8860B;
      --gold-light: #DAA520;
      --gray-dark: #2C2C2C;
      --gray-light: #F5F5F5;
      --gray-text: #666;
      --black: #1a1a1a;
      --white: #FFFFFF;
      --whatsapp: #25D366;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #fafafa 100%);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .thank-card {
      background: var(--white);
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      animation: fadeIn 0.7s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .smile {
      font-size: 5rem;
      display: inline-block;
      animation: bounce 1.2s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 2rem;
      color: var(--black);
      margin-bottom: 1rem;
      line-height: 1.3;
    }

    h1 .name-highlight {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1.15rem;
      color: var(--gray-text);
      margin-bottom: 2rem;
    }

    .info-box {
      background: var(--gray-light);
      border-right: 4px solid var(--gold);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-align: right;
      margin-bottom: 2rem;
      color: var(--gray-text);
      font-size: 0.95rem;
    }

    .info-box strong {
      color: var(--black);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: 0;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-whatsapp {
      background: var(--whatsapp);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(37, 211, 102, 0.35);
    }

    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45);
    }

    .btn-whatsapp svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .btn-back {
      background: transparent;
      color: var(--gray-text);
      border: 2px solid #e0e0e0;
    }

    .btn-back:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .footer-note {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--gray-text);
    }

    @media (max-width: 600px) {
      .thank-card { padding: 2.5rem 1.5rem; }
      h1 { font-size: 1.6rem; }
      .subtitle { font-size: 1rem; }
      .smile { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <main class="thank-card">
    <div class="smile" aria-hidden="true">😊</div>
    <h1 id="greeting">שמחים שהשארת פרטים!</h1>
    <p class="subtitle">קיבלנו את הפנייה שלך וניצור איתך קשר בהקדם.</p>

    <div class="info-box">
      <p><strong>⏱️ זמן חזרה:</strong> תוך 24 שעות בימי חול.</p>
      <p style="margin-top: 0.5rem;"><strong>🤙 רוצה לזרז את התהליך?</strong> אפשר לפנות אליי ישירות בוואטסאפ למטה.</p>
    </div>

    <div class="actions">
      <a id="wa-link" class="btn btn-whatsapp" href="https://wa.me/972544240213" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.488"/></svg>
        <span id="wa-text">דברו איתי בוואטסאפ</span>
      </a>
      <a class="btn btn-back" href="index.html">חזרה לדף הבית</a>
    </div>

    <p class="footer-note">בינתיים מוזמנים לקרוא תכנים נוספים <a href="blog.html" style="color: var(--gold); text-decoration: none; font-weight: 600;">בבלוג שלנו</a> 📚</p>
  </main>

  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var rawName = params.get('name') || '';
        var name = rawName.trim().split(/\s+/)[0];

        if (name && name.length > 0 && name.length < 40) {
          var greeting = document.getElementById('greeting');
          greeting.innerHTML = 'תודה רבה, <span class="name-highlight">' + escapeHtml(name) + '</span>! שמחים שהשארת פרטים';

          var waText = 'היי אורי, השארתי פרטים באתר. השם שלי ' + name + ' ואשמח להתקדם 🙂';
          var waLink = document.getElementById('wa-link');
          waLink.href = 'https://wa.me/972544240213?text=' + encodeURIComponent(waText);
        }
      } catch (e) {}

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, function (c) {
          return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
        });
      }
    })();
  </script>
</body>
</html>
